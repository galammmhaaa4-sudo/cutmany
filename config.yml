# ====================================================
# إعدادات نظام أتمتة قناة الكرتون
# ====================================================

# معلومات الكرتون (غيّر هذه القيم لكل كرتون جديد)
cartoon:
  name: "My Cartoon Show"          # اسم الكرتون
  episode_number: 1                 # رقم الحلقة الحالية
  language: "ar"                    # لغة المحتوى (ar = عربي)

# وضع الفيديو الحالي: 'long' للفيديو العادي (16:9) أو 'shorts' للفيديوهات القصيرة (9:16)
video_mode: "long"

# إعدادات الفيديوهات القصيرة (Shorts)
shorts:
  target_duration: 50               # المدة المستهدفة بالثواني (أقل من 60 ثانية)
  background_blur: true             # تفعيل الخلفية الضبابية

# إعدادات الفيديوهات الطويلة (Long)
long:
  min_duration: 240                 # الحد الأدنى للمدة بالثواني (4 دقائق)
  max_duration: 300                 # الحد الأقصى للمدة بالثواني (5 دقائق)

# إعدادات الـ Letterbox (الشريط العلوي والسفلي للوضع الطويل)
letterbox:
  bar_height: 80                    # ارتفاع الشريط بالبكسل
  bar_color: "#1a1a2e"              # لون الشريط (أزرق داكن)
  text_color: "#ffffff"             # لون النص الأبيض
  text_font_size: 36                # حجم الخط
  logo_path: "assets/channel_banner.png"  # مسار شعار القناة
  logo_opacity: 0.9                 # شفافية الشعار (0-1)

# إعدادات التحسينات وتجنب حقوق الملكية (Copyright Bypass)
enhancements:
  speed_multiplier: 1.04            # تسريع الفيديو والصوت (1.0 للتعطيل)
  color_grading:
    enabled: true                   # تعديل خفيف للألوان لتغيير البصمة الرقمية للـ Content ID
    brightness: 0.02                # تعديل الإضاءة (-1.0 إلى 1.0)
    contrast: 1.03                  # تعديل التباين
  watermark:
    enabled: true                   # علامة مائية متحركة لحماية المحتوى
    text: "youcatubarx"             # النص المعروض في العلامة المائية
    font_size: 24
    opacity: 0.5                    # الشفافية
    speed_x: 80                     # السرعة الأفقية (بكسل/ثانية)
    speed_y: 40                     # السرعة الرأسية

# إعدادات يوتيوب
youtube:
  category_id: "1"                  # 1 = Film & Animation
  privacy_status: "public"          # public / private / unlisted
  tags:
    - "كرتون"
    - "cartoon"
    - "anime"
    - "animation"
  upload_interval_hours: 2          # رفع مقطع كل X ساعات

# قوالب العنوان والوصف
metadata_templates:
  title: "{cartoon_name} | Episode {episode} - Part {part}"
  description: |
    🎬 {cartoon_name} - Episode {episode} | Part {part}
    
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    📺 شاهد المزيد من حلقات {cartoon_name} على قناتنا!
    🔔 اشترك في القناة وفعّل زر الجرس لتصلك كل الحلقات الجديدة
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    
    #cartoon #animation #{cartoon_name_tag}

# إعدادات Google Drive
google_drive:
  input_folder_name: "youcut"          # اسم مجلد الفيديوهات المدخلة
  processed_folder_name: "CartoonDone" # اسم مجلد الفيديوهات المعالجة
  
# إعدادات العمل
processing:
  temp_dir: "/tmp/cartoon_processing"  # مجلد مؤقت للمعالجة
  cleanup_after_upload: true           # حذف الملفات المؤقتة بعد الرفع
